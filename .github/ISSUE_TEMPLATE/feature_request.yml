name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        HamLog organizes features around operator scenarios (see
        [supported use cases](../blob/main/design_useCases.md)). Framing your
        request as "As an operator, I want to … so that …" helps a lot.
  - type: textarea
    id: scenario
    attributes:
      label: The scenario
      description: Who are you as an operator, and what are you trying to do?
      placeholder: As a POTA activator, I want to ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the feature look like? Screens, fields, behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this (optional).
